<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Home Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url('faithquest.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      height: 100vh;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    }
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5); 
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .mode-container {
      display: flex;
      gap: 20px;
    }
    .mode-box {
      background-color: #ff5722;
      color: white;
      padding: 20px 40px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.5rem;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s ease, transform 0.2s;
    }
    .mode-box:hover {
      background-color: #e64a19;
      transform: translateY(-5px);
    }
    .back-button {
      margin-top: 40px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .back-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>HOW WELL DO YOU KNOW YOUR BIBLE?</h2>
    <div class="mode-container">
      <div class="mode-box" onclick="goToPage('bibleIz.html')">QUESTIONS</div>
      <div class="mode-box" onclick="goToPage('bibleIz2.html')">SCRIPTURES</div>
    </div>

  <script>
    function goToPage(page) {
      window.location.href = page;
    }
  </script>
</body>
</html>
